<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project9_countdown_slideshow</title>
    <link rel="stylesheet" type="text/css" href="CSS/style.css" />
</head>

<body>
    <!--Countdown Timer Section-->
    <p>How many seconds would you like to set your alarm for?</p>
    <input type="number" id="seconds" value="" />
    <button onclick="countdown()" id="startBtn">Click Here</button>
    <p id="timer"></p>

    <!--Slideshow Section-->
    <div class="slideshow-container">
        <!--full width images with number and caption text-->
        <div class="mySlides fade">
            <div class="numbertext">1 / 3</div>
            <img src="img/img1.png" style="width: 100%" alt="Snowy Mountain" />
            <div class="text">Snowy Mountain</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 3</div>
            <img src="img/img2.png" style="width: 100%" alt="Aurora Borealis" />
            <div class="text">Aurora Borealis</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 3</div>
            <img src="img/img3.png" style="width: 100%" alt="Lake" />
            <div class="text">Lake</div>
        </div>

        <!--Next and previous buttons-->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br />

    <!--The current selection circles-->
    <div style="text-align: center">
        <span class="dot" onclick="currentSlides(1)"></span>
        <span class="dot" onclick="currentSlides(2)"></span>
        <span class="dot" onclick="currentSlides(3)"></span>
    </div>

    <script src="JS/main.js"></script>
</body>

</html>
